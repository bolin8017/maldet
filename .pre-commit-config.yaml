repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - typer>=0.12
          - types-jinja2>=2.11
          - numpy>=1.26
          - omegaconf>=2.3
          - tomli_w>=1.0
          - lightning>=2.5
          - torch>=2.2
          - torchmetrics>=1.3
        args: []
        pass_filenames: false
        files: ^src/
