name: publish

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for hatch-vcs if we add it later; harmless now
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv sync --all-extras --dev
      - name: Run tests (sanity)
        run: uv run pytest -m "not integration and not gpu"
      - name: Build
        run: uv build
      - name: Skip if version already on PyPI
        id: pypi_check
        run: |
          # Tag re-pushes (e.g. after a CI-only fix that doesn't change the
          # wheel content meaningfully) would otherwise hit PyPI's
          # "File already exists" 400. Treat existing-version as a no-op:
          # PyPI is immutable, the first artifact wins, and re-publishing the
          # same X.Y.Z is impossible by design. Yanking + new patch is the
          # explicit path when republish is actually needed.
          VERSION=$(grep -E '__version__\s*=' src/maldet/_version.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if curl -sf "https://pypi.org/pypi/maldet/${VERSION}/json" > /dev/null; then
            echo "maldet ${VERSION} already published; skipping upload"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to PyPI
        if: steps.pypi_check.outputs.skip == 'false'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: uv publish
